name: 功能建议
description: 提议符合产品宗旨的新能力或交互改进
title: "[Feature] "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: 希望解决的问题
      description: 请先描述使用场景，而不只是解决方案。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案与取舍
  - type: checkboxes
    id: principles
    attributes:
      label: 产品原则
      options:
        - label: 核心功能可以离线使用
          required: true
        - label: 不需要收集或上传用户数据
          required: true

